services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      DATABASE_URL: pgsql://app:app@postgres:5432/notifications?serverVersion=13&charset=utf8
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TOKEN_TTL_SECONDS: 2592000
      DEFAULT_TOPIC: default
      INTERNAL_API_SECRET: internal-secret
      INTERNAL_REGISTRATION_ENABLED: 0
    depends_on:
      - postgres
      - redis
    networks:
      - uber_notification

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - uber_notification

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - uber_notification

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - uber_notification

volumes:
  pgdata:
  redisdata:

networks:
  uber_notification:
    driver: bridge
