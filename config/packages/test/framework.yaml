framework:
  test: true
  rate_limiter:
    api_request:
      policy: 'fixed_window'
      limit: 120
      interval: '1 minute'
    internal_register:
      policy: 'fixed_window'
      limit: 10
      interval: '1 minute'
  session:
    storage_factory_id: session.storage.factory.mock_file
    cookie_secure: auto
    cookie_samesite: lax
    handler_id: null
