security:
  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    api:
      pattern: ^/api
      stateless: true
      custom_authenticators:
        - App\Security\BearerTokenAuthenticator
      entry_point: App\Security\BearerTokenAuthenticator

    main:
      security: false

  access_control:
    - { path: ^/api, roles: ROLE_API_USER }
